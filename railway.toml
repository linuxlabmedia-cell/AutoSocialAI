[build]
builder = "nixpacks"
buildCommand = "pnpm install && ./node_modules/.bin/prisma generate --schema=packages/db/prisma/schema.prisma && pnpm --filter @autosocial/web build"

[deploy]
startCommand = "pnpm --filter @autosocial/web start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
