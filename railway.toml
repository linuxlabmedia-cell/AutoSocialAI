[build]
builder = "nixpacks"
buildCommand = "NODE_ENV=development pnpm install && npx prisma@5 generate --schema=packages/db/prisma/schema.prisma && pnpm --filter @autosocial/web build"

[deploy]
startCommand = "pnpm --filter @autosocial/web start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
