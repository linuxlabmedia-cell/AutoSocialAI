[variables]
NODE_VERSION = "20"
NIXPACKS_PNPM_VERSION = "11"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@11 && pnpm install"]

[phases.build]
cmds = [
  "npx prisma generate --schema=packages/db/prisma/schema.prisma",
  "pnpm --filter @autosocial/web build"
]

[start]
cmd = "pnpm --filter @autosocial/web start"
